<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Shubham Pangale — Full Stack & Java developer. Portfolio, experience, projects, and contact."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Outfit:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <title>Shubham Pangale | Portfolio</title>
    <meta name="color-scheme" content="light dark" />
    <script>
      (function () {
        try {
          var k = 'portfolio-theme'
          var t = localStorage.getItem(k)
          var root = document.documentElement
          if (t === 'light') root.classList.remove('dark')
          else if (t === 'dark') root.classList.add('dark')
          else root.classList.add('dark')
        } catch (e) {}
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
